<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HQ Strikepro</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E63946;
      --primary-dark: #c1121f;
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f1f1f1;
      --text-muted: #888;
      --input-bg: #111;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .logo-mark {
      width: 88px;
      height: 88px;
      background: transparent;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo-mark svg {
      width: 40px;
      height: 40px;
    }

    .logo-name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-name span {
      color: var(--primary);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: calc(var(--radius-sm) - 2px);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: transparent;
      color: var(--text-muted);
    }

    .tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: #444;
    }

    input:focus {
      border-color: var(--primary);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 44px;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 4px;
    }

    .eye-btn:hover { color: var(--text); }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Forgot link ── */
    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 18px;
    }

    .forgot a {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Alert ── */
    .alert {
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error {
      background: rgba(230, 57, 70, 0.12);
      border: 1px solid rgba(230, 57, 70, 0.3);
      color: #ff6b76;
    }

    .alert.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .alert.show { display: block; }

    /* ── Password strength ── */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-bar span {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .strength-label {
      font-size: 11px;
      margin-top: 5px;
      color: var(--text-muted);
    }

    /* ── Dashboard ── */
    #dashboardView {
      display: none;
      width: 100%;
      max-width: 400px;
    }

    .dash-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .dash-info h2 {
      font-size: 16px;
      font-weight: 700;
    }

    .dash-info p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .dash-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .dash-card p {
      font-size: 15px;
      color: var(--text);
    }

    .btn-outline {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Shake animation for errors */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
<div class="app">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">
      <img src="/logo.png.png" alt="HQ Strikepro" style="width:88px;height:88px;object-fit:contain;" />
    </div>
    <div class="logo-name">HQ <span>STRIKEPRO</span></div>
  </div>

  <!-- Auth Card -->
  <div class="card" id="authCard">
    <div class="tabs">
      <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- ── SIGN IN FORM ── -->
    <form id="signinForm" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label for="siEmail">Strikepro Email</label>
        <input type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="siPassword">Password</label>
        <div class="password-wrap">
          <input type="password" id="siPassword" placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="eye-btn" onclick="togglePwd('siPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="forgot"><a href="#" onclick="return false;">Forgot password?</a></div>
      <button type="submit" id="btnSignIn" data-label="Sign In" class="btn-primary">Sign In</button>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="regEmail">Strikepro Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="password-wrap">
          <input type="password" id="regPassword" placeholder="Create a password" autocomplete="new-password"
                 oninput="checkStrength(this.value)" required />
          <button type="button" class="eye-btn" onclick="togglePwd('regPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar">
          <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="regConfirm" placeholder="Repeat your password" autocomplete="new-password" required />
          <button type="button" class="eye-btn" onclick="togglePwd('regConfirm', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" id="btnRegister" data-label="Create Account" class="btn-primary">Create Account</button>
    </form>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboardView">
    <div class="logo" style="margin-bottom:24px">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="#fff"/>
        </svg>
      </div>
      <div class="logo-name">Strike<span>pro</span></div>
    </div>
    <div class="dash-header">
      <div class="avatar" id="dashAvatar"></div>
      <div class="dash-info">
        <h2>Welcome back!</h2>
        <p id="dashEmail"></p>
      </div>
    </div>
    <div class="dash-card">
      <h3>Account</h3>
      <p id="dashEmailFull"></p>
    </div>
    <div class="dash-card">
      <h3>Member Since</h3>
      <p id="dashJoined">—</p>
    </div>
    <div class="dash-card">
      <h3>Status</h3>
      <p style="color:#4ade80">● Active</p>
    </div>
    <button class="btn-outline" onclick="signOut()">Sign Out</button>
  </div>

</div>

<script>
  const API = '/api/auth';
  const TOKEN_KEY = 'sp_token';

  // ── API helper ──
  async function apiFetch(path, options = {}) {
    const token = localStorage.getItem(TOKEN_KEY);
    const res = await fetch(API + path, {
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {})
      },
      ...options,
      body: options.body ? JSON.stringify(options.body) : undefined
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Something went wrong.');
    return data;
  }

  // ── Tab switching ──
  function switchTab(tab) {
    clearAlert();
    document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('signinForm').style.display = tab === 'signin' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  }

  // ── Alert ──
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  function clearAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function shakeCard() {
    const card = document.getElementById('authCard');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  // ── Password visibility toggle ──
  function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  // ── Password strength ──
  function checkStrength(pwd) {
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;

    const colors = ['#E63946','#f4a261','#e9c46a','#4ade80'];
    const labels = ['Weak','Fair','Good','Strong'];

    ['s1','s2','s3','s4'].forEach((id, i) => {
      document.getElementById(id).style.background = i < score ? colors[score - 1] : 'var(--border)';
    });

    const label = document.getElementById('strengthLabel');
    label.textContent = pwd.length === 0 ? '' : labels[score - 1] || 'Weak';
    label.style.color  = pwd.length === 0 ? '' : colors[score - 1] || colors[0];
  }

  // ── Register ──
  async function handleRegister(e) {
    e.preventDefault();
    clearAlert();

    const email = document.getElementById('regEmail').value.trim();
    const pwd   = document.getElementById('regPassword').value;
    const conf  = document.getElementById('regConfirm').value;

    if (pwd.length < 6) { showAlert('Password must be at least 6 characters.'); shakeCard(); return; }
    if (pwd !== conf)    { showAlert('Passwords do not match.');                 shakeCard(); return; }

    setLoading('btnRegister', true);
    try {
      const { token, user } = await apiFetch('/register', { method: 'POST', body: { email, password: pwd } });
      localStorage.setItem(TOKEN_KEY, token);
      showAlert('Account created! Signing you in…', 'success');
      setTimeout(() => loadDashboard(user), 800);
    } catch (err) {
      showAlert(err.message);
      shakeCard();
    } finally {
      setLoading('btnRegister', false);
    }
  }

  // ── Sign In ──
  async function handleSignIn(e) {
    e.preventDefault();
    clearAlert();

    const email = document.getElementById('siEmail').value.trim();
    const pwd   = document.getElementById('siPassword').value;

    setLoading('btnSignIn', true);
    try {
      const { token, user } = await apiFetch('/login', { method: 'POST', body: { email, password: pwd } });
      localStorage.setItem(TOKEN_KEY, token);
      loadDashboard(user);
    } catch (err) {
      showAlert(err.message);
      shakeCard();
    } finally {
      setLoading('btnSignIn', false);
    }
  }

  // ── After login → go to My Clients ──
  function loadDashboard() {
    window.location.href = '/clients.html';
  }

  // ── Auto-login on reload ──
  (async function init() {
    if (!localStorage.getItem(TOKEN_KEY)) return;
    try {
      await apiFetch('/me');
      window.location.href = '/clients.html';
    } catch {
      localStorage.removeItem(TOKEN_KEY);
    }
  })();
</script>
</body>
</html>
